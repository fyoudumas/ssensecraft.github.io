<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Indices</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #131722; overflow: hidden; }
  .widget-wrap { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div class="widget-wrap">
<!-- TradingView Widget BEGIN -->
<div class="tradingview-widget-container" style="height:100%;width:100%">
  <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
  {
    "colorTheme": "dark",
    "dateRange": "1M",
    "showChart": false,
    "locale": "en",
    "largeChartUrl": "",
    "isTransparent": true,
    "showSymbolLogo": false,
    "showFloatingTooltip": false,
    "width": "100%",
    "height": "100%",
    "tabs": [
      {
        "title": "Indices",
        "symbols": [
          { "s": "FOREXCOM:DJI", "d": "Dow Jones" },
          { "s": "PEPPERSTONE:US2000", "d": "Russell 2000" },
          { "s": "FOREXCOM:SPX500", "d": "S&P 500" },
          { "s": "CAPITALCOM:VIX", "d": "VIX" },
          { "s": "CAPITALCOM:DXY", "d": "US Dollar" },
          { "s": "TVC:TNX", "d": "10Y Yield" }
        ],
        "originalTitle": "Indices"
      }
    ]
  }
  </script>
</div>
<!-- TradingView Widget END -->
</div>
</body>
</html>
